query GetCustomerWishlist {
  customer {
    wishlist {
      id
      items_count
      items {
        id
        product {
          id
          name
          sku
          url_key
          thumbnail {
            url
            label
          }
          price_range {
            minimum_price {
              final_price {
                value
                currency
              }
            }
          }
        }
      }
    }
  }
}
